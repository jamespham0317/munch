name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Server-only keys must never reach a client bundle (CLAUDE.md §3).
      - name: Scan apps/ and packages/ for provider / service-role keys
        run: bash scripts/check-secrets.sh

  build:
    name: typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # corepack first so setup-node's pnpm cache can resolve the pinned pnpm.
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
